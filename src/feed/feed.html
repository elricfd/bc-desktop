<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Bandcamp</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; scrollbar-width: none; -ms-overflow-style: none; }
        ::-webkit-scrollbar { width: 0; height: 0; display: none; }
        :root {
            --bg: #181a1b; --bar: #1b1e1f; --card: #202325; --text: #e8e6e3;
            --muted: #9a968e; --sub: #848079; --line: #2a2e30; --accent: #1da0c3;
        }
        html, body { height: 100%; }
        body {
            background: var(--bg); color: var(--text); overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Roboto, sans-serif;
            display: flex; flex-direction: column; user-select: none;
        }
        .toolbar {
            display: flex; align-items: center; gap: 10px; padding: 12px 18px;
            border-bottom: 1px solid var(--line); background: var(--bar); flex-shrink: 0;
        }
        .toolbar h1 { font-size: 14px; font-weight: 600; margin-right: 6px; }
        .count { font-size: 11px; color: var(--sub); }
        .spacer { flex: 1; }
        .chip {
            background: #24282a; border: 1px solid var(--line); color: var(--muted);
            border-radius: 999px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: inherit;
        }
        .chip.on { color: #fff; border-color: var(--accent); background: rgba(29,160,195,.12); }
        .tbtn {
            background: #24282a; border: 1px solid var(--line); color: var(--text);
            border-radius: 6px; padding: 7px 10px; font-size: 12px; cursor: pointer;
        }
        .tbtn:hover { border-color: var(--accent); }
        .list {
            flex: 1; overflow-y: auto; padding: 16px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; align-content: start;
            scrollbar-width: thin; scrollbar-color: #3a3f42 transparent;
        }
        .daysep {
            grid-column: 1 / -1; font-size: 12px; color: var(--sub); font-weight: 600;
            padding: 8px 0 0; border-bottom: 1px solid var(--line); margin-bottom: -6px;
        }
        .card { cursor: pointer; position: relative; }
        .card .art {
            width: 100%; aspect-ratio: 1 / 1; border-radius: 6px; background: #2a2e30;
            object-fit: cover; display: block; transition: transform .12s ease;
        }
        .card:hover .art { transform: scale(1.03); outline: 2px solid var(--accent); }
        .card .t { font-size: 12px; margin-top: 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card .a { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
        .card .w { font-size: 10px; color: var(--sub); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .badge {
            position: absolute; left: 6px; top: 6px; font-size: 9px; letter-spacing: .05em;
            background: rgba(24,26,27,.85); color: var(--accent); border-radius: 4px; padding: 3px 6px;
            text-transform: uppercase; pointer-events: none;
        }
        .badge.df { color: var(--muted); }
        .artwrap { position: relative; }
        .play, .enq {
            position: absolute; width: 30px; height: 30px; border: none; border-radius: 50%;
            background: rgba(24,26,27,.82); color: #fff; line-height: 1; cursor: pointer;
            opacity: 0; transition: opacity .12s ease;
        }
        .play { right: 6px; bottom: 6px; font-size: 13px; }
        .enq { right: 6px; top: 6px; font-size: 18px; }
        .card:hover .play, .card:hover .enq { opacity: 1; }
        .play:hover, .enq:hover { background: var(--accent); }
        .state { padding: 40px 18px; color: var(--muted); font-size: 13px; grid-column: 1 / -1; }

        /* expanded story panel (tracklist / tags / description) */
        .fdpanel {
            grid-column: 1 / -1; display: flex; gap: 24px; align-items: flex-start;
            background: #1b1e1f; border: 1px solid var(--line); border-radius: 10px;
            padding: 20px; margin: 4px 0; animation: fdslide .18s ease;
        }
        @keyframes fdslide { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
        .fdleft { width: 200px; flex-shrink: 0; position: sticky; top: 20px; }
        .fdart { width: 100%; aspect-ratio: 1/1; border-radius: 6px; object-fit: cover; background: #2a2e30; display: block; }
        .fdtitle { font-size: 14px; font-weight: 600; margin-top: 12px; line-height: 1.3; }
        .fdartist { font-size: 12px; color: var(--muted); margin-top: 4px; }
        .fdwhen { font-size: 11px; color: var(--sub); margin-top: 2px; }
        .fdbtns { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
        .fdbtns button {
            background: #24282a; border: 1px solid var(--line); color: var(--text);
            border-radius: 6px; padding: 6px 12px; font-size: 11px; cursor: pointer; font-family: inherit;
            flex: 1; text-align: center; white-space: nowrap;
        }
        .fdbtns .fdplayall { background: var(--accent); border-color: var(--accent); color: #fff; flex: 100%; }
        .fdbtns button:hover { filter: brightness(1.12); }
        .fdright { flex: 1; min-width: 0; }
        .fdtags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
        .fdtag {
            font-size: 11px; color: var(--muted); background: #24282a; border: 1px solid var(--line);
            border-radius: 999px; padding: 3px 9px;
        }
        .fdabout {
            font-size: 12px; color: var(--muted); line-height: 1.55; white-space: pre-wrap;
            max-height: 130px; overflow-y: auto; margin-bottom: 12px; user-select: text;
            scrollbar-width: thin; scrollbar-color: #3a3f42 transparent;
        }
        .fdtracks {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 4px 24px; align-content: start;
        }
        .fdstate { color: var(--muted); font-size: 13px; padding: 8px 0; grid-column: 1 / -1; }
        .fdrow {
            display: flex; align-items: center; gap: 10px; padding: 6px 8px; cursor: pointer;
            font-size: 13px; border-radius: 5px; height: 32px;
        }
        .fdrow:hover { background: rgba(255,255,255,.06); }
        .fdnum { width: 20px; text-align: right; color: var(--sub); font-size: 12px; flex-shrink: 0; }
        .fdtrk { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .fddur { color: var(--sub); font-size: 12px; flex-shrink: 0; }
    </style>
</head>
<body>
    <div class="toolbar">
        <h1>Feed</h1>
        <span class="count" id="count"></span>
        <div class="spacer"></div>
        <button class="chip on" id="f-all" type="button">All</button>
        <button class="chip" id="f-nr" type="button">New releases</button>
        <button class="chip" id="f-df" type="button">Fan activity</button>
        <button class="tbtn" id="refresh" title="Reload">Reload</button>
        <button class="tbtn" id="close" title="Close">Close</button>
    </div>
    <div class="list" id="list"><div class="state" id="state">Loading your feed…</div></div>

    <script>require('./feed.js');</script>
</body>
</html>
