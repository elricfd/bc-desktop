<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Bandcamp</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; scrollbar-width: none; -ms-overflow-style: none; }
        ::-webkit-scrollbar { width: 0; height: 0; display: none; }
        :root {
            --bg: #181a1b; --bar: #1b1e1f; --card: #202325; --text: #e8e6e3;
            --muted: #9a968e; --sub: #848079; --line: #2a2e30; --accent: #1da0c3;
        }
        html, body { height: 100%; }
        body {
            background: var(--bg); color: var(--text); overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Roboto, sans-serif;
            display: flex; flex-direction: column; user-select: none;
        }
        .toolbar {
            display: flex; align-items: center; gap: 10px; padding: 12px 18px;
            border-bottom: 1px solid var(--line); background: var(--bar); flex-shrink: 0;
        }
        .toolbar h1 { font-size: 14px; font-weight: 600; margin-right: 6px; }
        input[type="text"] {
            background: #121415; border: 1px solid var(--line); border-radius: 6px;
            color: var(--text); padding: 8px 12px; font-size: 13px; font-family: inherit;
            outline: none; flex: 1; max-width: 480px; user-select: text;
        }
        input[type="text"]:focus { border-color: var(--accent); }
        .spacer { flex: 1; }
        .chip {
            background: #24282a; border: 1px solid var(--line); color: var(--muted);
            border-radius: 999px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: inherit;
        }
        .chip.on { color: #fff; border-color: var(--accent); background: rgba(29,160,195,.12); }
        .tbtn {
            background: #24282a; border: 1px solid var(--line); color: var(--text);
            border-radius: 6px; padding: 7px 10px; font-size: 12px; cursor: pointer;
        }
        .tbtn:hover { border-color: var(--accent); }
        .list {
            flex: 1; overflow-y: auto; padding: 10px 18px 18px;
            scrollbar-width: thin; scrollbar-color: #3a3f42 transparent;
        }
        .row {
            display: flex; align-items: center; gap: 12px; padding: 8px 10px;
            border-radius: 8px; cursor: pointer; position: relative;
        }
        .row:hover { background: rgba(255,255,255,.05); }
        .rart { width: 48px; height: 48px; border-radius: 5px; background: #2a2e30; object-fit: cover; flex-shrink: 0; }
        .rmeta { min-width: 0; flex: 1; }
        .rname { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rsub { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
        .rbadge {
            font-size: 9px; letter-spacing: .06em; text-transform: uppercase; flex-shrink: 0;
            color: var(--accent); background: rgba(29,160,195,.1); border: 1px solid rgba(29,160,195,.3);
            border-radius: 4px; padding: 3px 7px;
        }
        .rbadge.b { color: var(--muted); background: rgba(255,255,255,.04); border-color: var(--line); }
        .ract { display: flex; gap: 6px; flex-shrink: 0; opacity: 0; transition: opacity .1s ease; }
        .row:hover .ract { opacity: 1; }
        .ract button {
            width: 30px; height: 30px; border: none; border-radius: 50%;
            background: rgba(255,255,255,.08); color: #fff; cursor: pointer; font-size: 13px; line-height: 1;
        }
        .ract button:hover { background: var(--accent); }
        .state { padding: 40px 0; color: var(--muted); font-size: 13px; }
    </style>
</head>
<body>
    <div class="toolbar">
        <h1>Search</h1>
        <input type="text" id="q" placeholder="Search all of Bandcamp — tracks, albums, artists…" spellcheck="false" autocomplete="off">
        <div class="spacer"></div>
        <button class="chip on" id="f-all" type="button">All</button>
        <button class="chip" id="f-t" type="button">Tracks</button>
        <button class="chip" id="f-a" type="button">Albums</button>
        <button class="chip" id="f-b" type="button">Artists</button>
        <button class="tbtn" id="close" title="Close">Close</button>
    </div>
    <div class="list" id="list"><div class="state">Type to search Bandcamp. Results play straight into the queue.</div></div>

    <script>require('./search.js');</script>
</body>
</html>
