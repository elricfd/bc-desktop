<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Bandcamp</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; scrollbar-width: none; -ms-overflow-style: none; }
        ::-webkit-scrollbar { width: 0; height: 0; display: none; }
        :root {
            --bg: #181a1b; --bar: #1b1e1f; --panel: #161819;
            --text: #e8e6e3; --muted: #9a968e; --sub: #848079;
            --line: #2a2e30; --accent: #1da0c3; --hover: #ffffff;
        }
        html, body { height: 100%; }
        body {
            background: transparent; color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Roboto, sans-serif;
            user-select: none; overflow: hidden;
        }

        /* SLIDE UP QUEUE PANEL */
        .queue-panel {
            position: fixed; left: 0; right: 0; bottom: 64px; height: 360px;
            background: var(--panel); border-top: 1px solid var(--line);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .queue-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 18px; font-size: 12px; letter-spacing: .08em;
            text-transform: uppercase; color: var(--sub); border-bottom: 1px solid var(--line);
        }
        .q-close {
            background: none; border: none; color: var(--sub); cursor: pointer;
            font-size: 20px; line-height: 1; padding: 0 2px; display: flex; align-items: center;
        }
        .q-close:hover { color: var(--hover); }
        .queue-list { flex: 1; overflow-y: auto; padding: 6px 0; }
        .q-row {
            display: flex; align-items: center; gap: 12px; padding: 7px 18px; cursor: pointer;
        }
        .q-row:hover { background: rgba(255,255,255,.04); }
        .q-row.active { background: rgba(29,160,195,.12); }
        .q-row.active .q-title { color: var(--accent); }
        .q-art { width: 34px; height: 34px; border-radius: 2px; background: #242729; object-fit: cover; flex-shrink: 0; }
        .q-meta { flex: 1; overflow: hidden; }
        .q-title { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .q-artist { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
        .q-dur { font-size: 11px; color: var(--sub); }

        /* BOTTOM PLAYER BAR */
        .player-bar {
            position: fixed; left: 0; right: 0; bottom: 0; height: 64px;
            background: var(--bar); border-top: 1px solid var(--line);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 18px; gap: 16px;
        }

        .now-playing { display: flex; align-items: center; gap: 12px; width: 26%; min-width: 150px; overflow: hidden; }
        /* hidden until something is playing so there's no empty grey box at idle */
        .art { width: 46px; height: 46px; border-radius: 3px; background: #242729; object-fit: cover; flex-shrink: 0; display: none; }
        .info { display: flex; flex-direction: column; overflow: hidden; white-space: nowrap; }
        .title { font-size: 13px; font-weight: 600; color: #fff; text-overflow: ellipsis; overflow: hidden; }
        .artist { font-size: 11px; color: var(--muted); text-overflow: ellipsis; overflow: hidden; margin-top: 3px; }
        .title.link, .artist.link { cursor: pointer; }
        .title.link:hover, .artist.link:hover { text-decoration: underline; }

        .center { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; max-width: 560px; }
        .transport { display: flex; align-items: center; gap: 18px; }
        .btn { background: none; border: none; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
        .btn:hover { color: var(--hover); }
        .btn.on { color: var(--accent); }
        .btn-play { background: var(--text); color: var(--bg); width: 32px; height: 32px; border-radius: 50%; }
        .btn-play:hover { transform: scale(1.06); color: var(--bg); }

        .prog { display: flex; align-items: center; gap: 9px; width: 100%; font-size: 11px; color: var(--sub); }
        input[type="range"] {
            -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px;
            background: var(--line); cursor: pointer; accent-color: var(--accent);
        }
        #seek { flex: 1; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 11px; height: 11px; border-radius: 50%; background: var(--text);
        }

        .right { display: flex; align-items: center; justify-content: flex-end; gap: 14px; width: 26%; min-width: 150px; }
        #vol { width: 84px; }

        /* repeat-one */
        .btn-repeat.one::after {
            content: "1"; position: absolute; font-size: 8px; font-weight: 700;
            transform: translate(9px, 5px); color: var(--accent);
        }
        .btn-repeat { position: relative; }
    </style>
</head>
<body>
    <audio id="engine"></audio>

    <!-- queue panel (visible only when expanded by main process) -->
    <div class="queue-panel" id="queue-panel">
        <div class="queue-head">
            <span>Up Next</span>
            <button id="btn-queue-close" class="q-close" title="Close queue" aria-label="Close queue">&times;</button>
        </div>
        <div class="queue-list" id="queue-list"></div>
    </div>

    <!-- PLAYER BAR -->
    <div class="player-bar">
        <div class="now-playing">
            <img class="art" id="art" alt="">
            <div class="info">
                <div class="title" id="title"></div>
                <div class="artist" id="artist"></div>
            </div>
        </div>

        <div class="center">
            <div class="transport">
                <button id="btn-shuffle" class="btn btn-shuffle" title="Shuffle">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
                </button>
                <button id="btn-prev" class="btn" title="Previous">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button id="btn-play" class="btn btn-play" title="Play / Pause">
                    <svg id="i-play" width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="i-pause" width="15" height="15" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button id="btn-next" class="btn" title="Next">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
                <button id="btn-repeat" class="btn btn-repeat" title="Repeat: off">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
                </button>
            </div>
            <div class="prog">
                <span id="t-cur">0:00</span>
                <input type="range" id="seek" value="0" min="0" max="100">
                <span id="t-dur">0:00</span>
            </div>
        </div>

        <div class="right">
            <button id="btn-queue" class="btn" title="Queue">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M3 6h13v2H3V6zm0 5h13v2H3v-2zm0 5h9v2H3v-2zm15-4 4 3-4 3v-6z"/></svg>
            </button>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:var(--sub)"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            <input type="range" id="vol" min="0" max="1" step="0.01" value="0.8">
        </div>
    </div>

    <script>require('./player.js');</script>
</body>
</html>
