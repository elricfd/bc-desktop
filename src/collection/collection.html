<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Bandcamp</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; scrollbar-width: none; -ms-overflow-style: none; }
        ::-webkit-scrollbar { width: 0; height: 0; display: none; }
        :root {
            --bg: #181a1b; --bar: #1b1e1f; --card: #202325; --text: #e8e6e3;
            --muted: #9a968e; --sub: #848079; --line: #2a2e30; --accent: #1da0c3;
        }
        html, body { height: 100%; }
        body {
            background: var(--bg); color: var(--text); overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Roboto, sans-serif;
            display: flex; flex-direction: column; user-select: none;
        }
        .toolbar {
            display: flex; align-items: center; gap: 10px; padding: 12px 18px;
            border-bottom: 1px solid var(--line); background: var(--bar); flex-shrink: 0;
        }
        .toolbar h1 { font-size: 14px; font-weight: 600; margin-right: 6px; }
        .count { font-size: 11px; color: var(--sub); }
        .spacer { flex: 1; }
        input[type="text"], select {
            background: #121415; border: 1px solid var(--line); border-radius: 6px;
            color: var(--text); padding: 7px 10px; font-size: 12px; font-family: inherit; outline: none;
        }
        select {
            -webkit-appearance: none; appearance: none; padding-right: 30px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 10 10"><path d="M2 3.5l3 3 3-3" fill="none" stroke="%239a968e" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>');
            background-repeat: no-repeat; background-position: right 11px center;
        }
        input[type="text"]:focus, select:focus { border-color: var(--accent); }
        #search { width: 220px; }
        .tbtn {
            background: #24282a; border: 1px solid var(--line); color: var(--text);
            border-radius: 6px; padding: 7px 10px; font-size: 12px; cursor: pointer;
        }
        .tbtn:hover { border-color: var(--accent); }
        .grid {
            flex: 1; overflow-y: auto; padding: 16px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; align-content: start;
            /* the page-wide rules hide every scrollbar; the collection is the one
               surface long enough to need a visible one, so restore a slim one here */
            scrollbar-width: thin; scrollbar-color: #3a3f42 transparent;
        }
        .card { cursor: pointer; }
        .card .art {
            width: 100%; aspect-ratio: 1 / 1; border-radius: 6px; background: #2a2e30;
            object-fit: cover; display: block; transition: transform .12s ease;
        }
        .card:hover .art { transform: scale(1.03); outline: 2px solid var(--accent); }
        .card .t { font-size: 12px; margin-top: 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card .a { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
        .card .y { font-size: 10px; color: var(--sub); margin-top: 1px; }
        .state { padding: 40px 18px; color: var(--muted); font-size: 13px; }

        .artwrap { position: relative; }
        .dl {
            position: absolute; right: 6px; bottom: 6px; width: 28px; height: 28px;
            border: none; border-radius: 50%; background: rgba(24,26,27,.82); color: #fff;
            font-size: 15px; line-height: 1; cursor: pointer; opacity: 0; transition: opacity .12s ease;
        }
        .card:hover .dl { opacity: 1; }
        .dl:hover { background: var(--accent); }
        .enq {
            position: absolute; right: 6px; top: 6px; width: 28px; height: 28px;
            border: none; border-radius: 50%; background: rgba(24,26,27,.82); color: #fff;
            font-size: 18px; line-height: 1; cursor: pointer; opacity: 0; transition: opacity .12s ease;
        }
        .card:hover .enq { opacity: 1; }
        /* wishlist marker (top-left of the cover) */
        .wishb {
            position: absolute; left: 6px; top: 6px; font-size: 12px; line-height: 1;
            background: rgba(24,26,27,.85); color: #e46; border-radius: 4px; padding: 4px 6px;
            pointer-events: none;
        }
        .enq:hover { background: var(--accent); }
        .dlmenu {
            position: fixed; z-index: 50; width: 190px; background: #202325;
            border: 1px solid var(--line); border-radius: 8px; padding: 6px; font-size: 12px;
            color: var(--muted); box-shadow: 0 8px 24px rgba(0,0,0,.4);
            max-height: 320px; overflow-y: auto;
        }
        .dlfmt {
            display: block; width: 100%; text-align: left; background: none; border: none;
            color: var(--text); padding: 7px 9px; border-radius: 5px; font-size: 12px; cursor: pointer;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .dlfmt:hover { background: rgba(255,255,255,.06); }

        /* CRITICAL: Tracklist Layout Fixes */
        .tlinline {
            grid-column: 1 / -1; display: flex; gap: 24px; align-items: flex-start;
            background: #1b1e1f; border: 1px solid var(--line); border-radius: 10px;
            padding: 20px; margin: 4px 0; height: max-content; /* Force full height calculation */
            animation: tlslide .18s ease;
        }
        @keyframes tlslide { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
        .tlleft { width: 180px; flex-shrink: 0; position: sticky; top: 20px; }
        .tlart { width: 100%; aspect-ratio: 1/1; border-radius: 6px; object-fit: cover; background: #2a2e30; display: block; }
        .tltitle { font-size: 14px; font-weight: 600; margin-top: 12px; line-height: 1.3; }
        .tlartist { font-size: 12px; color: var(--muted); margin-top: 4px; }
        .tlyear { font-size: 11px; color: var(--sub); margin-top: 2px; }
        .tltags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .tltag {
            font-size: 11px; color: var(--muted); background: #24282a; border: 1px solid var(--line);
            border-radius: 999px; padding: 3px 9px; cursor: pointer;
        }
        .tltag:hover { border-color: var(--accent); color: var(--text); }
        /* album / artist text in the panel links to its group in the list view */
        .tltitle, .tlartist { cursor: pointer; }
        .tltitle:hover, .tlartist:hover { text-decoration: underline; }

        /* modal notice (large collection advice) */
        .modalback {
            position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.55);
            display: flex; align-items: center; justify-content: center;
        }
        .modal {
            width: 420px; max-width: calc(100vw - 40px); background: #202325;
            border: 1px solid var(--line); border-radius: 10px; padding: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,.5);
        }
        .modal h3 { font-size: 14px; margin-bottom: 8px; }
        .modal p { font-size: 12px; color: var(--muted); line-height: 1.55; margin-bottom: 14px; }
        .modal .mrow { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
        .modal button {
            background: #24282a; border: 1px solid var(--line); color: var(--text);
            border-radius: 6px; padding: 7px 12px; font-size: 12px; cursor: pointer; font-family: inherit;
        }
        .modal button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .modal button:hover { filter: brightness(1.12); }

        /* clickable tags in the list view genre column */
        .lv-tag { cursor: pointer; }
        .lv-tag:hover { color: var(--accent); text-decoration: underline; }

        /* optional group headers in the grid view (settings toggle) */
        .gridsep {
            grid-column: 1 / -1; font-size: 12px; color: var(--sub); font-weight: 600;
            padding: 8px 0 0; border-bottom: 1px solid var(--line); margin-bottom: -6px;
        }
        .tlbtns { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
        .tlbtns button {
            background: #24282a; border: 1px solid var(--line); color: var(--text);
            border-radius: 6px; padding: 6px 12px; font-size: 11px; cursor: pointer; font-family: inherit;
            flex: 1; text-align: center;
        }
        .tlbtns .tlplayall { background: var(--accent); border-color: var(--accent); color: #fff; flex: 100%; }
        .tlbtns button:hover { filter: brightness(1.12); }
        
        /* Replaced column-width with a CSS Grid for robust wrapping */
        .tlright { 
            flex: 1; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 4px 24px; 
            align-content: start;
        }
        .tlstate { color: var(--muted); font-size: 13px; padding: 8px 0; grid-column: 1 / -1; }
        .tlrow {
            display: flex; align-items: center; gap: 10px; padding: 6px 8px; cursor: pointer;
            font-size: 13px; border-radius: 5px; height: 32px;
        }
        .tlrow:hover { background: rgba(255,255,255,.06); }
        .tlnum { width: 20px; text-align: right; color: var(--sub); font-size: 12px; flex-shrink: 0; }
        .tltrk { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tldur { color: var(--sub); font-size: 12px; flex-shrink: 0; }
        /* track list view (all tracks of every release, foobar-style) */
        .grid.listmode { display: block; padding: 0 0 16px; }
        .lv-head, .lv-row {
            display: grid; grid-template-columns: 44px 1fr 1.5fr 1.4fr 52px 1fr 56px;
            gap: 10px; align-items: center; padding: 0 18px;
        }
        .lv-yr { color: var(--sub); font-size: 12px; }
        .lv-head {
            position: sticky; top: 0; z-index: 5; background: var(--bar);
            border-bottom: 1px solid var(--line); height: 34px;
            font-size: 11px; color: var(--sub); text-transform: none; font-weight: 600;
        }
        .lv-head span { cursor: pointer; user-select: none; }
        .lv-head span:hover { color: var(--text); }
        .lv-head span.on { color: var(--accent); }
        .lv-genrehead {
            padding: 14px 18px 5px; font-size: 12px; font-weight: 600; color: var(--accent);
            border-bottom: 1px solid var(--line);
        }
        .lv-row { height: 34px; font-size: 13px; cursor: pointer; }
        .lv-row:hover { background: rgba(255,255,255,.06); }
        .lv-row > span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .lv-num { text-align: right; color: var(--sub); font-size: 12px; }
        .lv-art { color: var(--muted); }
        .lv-alb { color: var(--muted); }
        .lv-gen { color: var(--sub); font-size: 12px; }
        .lv-dur { text-align: right; color: var(--sub); font-size: 12px; }

        /* playlists panel: swaps in for the grid (which keeps rendering hidden) */
        .plov {
            flex: 1; overflow-y: auto; padding: 16px 18px;
            scrollbar-width: thin; scrollbar-color: #3a3f42 transparent;
        }
        .tbtn.on { border-color: var(--accent); color: var(--accent); }
        .pl-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; align-content: start; }
        .pl-card { cursor: pointer; }
        .pl-cover {
            width: 100%; aspect-ratio: 1 / 1; border-radius: 8px; background: #202325; overflow: hidden;
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
            border: 1px solid var(--line); transition: transform .12s ease;
        }
        .pl-card:hover .pl-cover { transform: scale(1.02); outline: 2px solid var(--accent); }
        .pl-cover img { width: 100%; height: 100%; object-fit: cover; }
        /* fewer than 4 covers: the first one fills the whole tile */
        .pl-cover img:only-child, .pl-cover .pl-empty { grid-column: 1 / -1; grid-row: 1 / -1; }
        .pl-cover .pl-empty { display: flex; align-items: center; justify-content: center; font-size: 34px; color: var(--sub); }
        .pl-cover.sm { width: 96px; flex-shrink: 0; }
        .pl-name { font-size: 12px; margin-top: 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pl-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
        .pl-new {
            aspect-ratio: 1 / 1; border: 1px dashed var(--line); border-radius: 8px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
            color: var(--muted); font-size: 12px; background: none; font-family: inherit;
        }
        .pl-new:hover { border-color: var(--accent); color: var(--text); }
        .pl-new .big { font-size: 28px; line-height: 1; }
        /* playlist detail */
        .pl-head { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
        .pl-title { font-size: 17px; font-weight: 600; cursor: pointer; }
        .pl-title:hover { text-decoration: underline; }
        .pl-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
        .pl-actions { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
        .pl-actions .primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .pl-row {
            display: grid; grid-template-columns: 30px 1.4fr 1fr 1fr 46px 26px; gap: 10px;
            align-items: center; height: 36px; padding: 0 10px; border-radius: 6px;
            cursor: pointer; font-size: 13px;
        }
        .pl-row:hover { background: rgba(255,255,255,.06); }
        .pl-row > span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pl-num { text-align: right; color: var(--sub); font-size: 12px; }
        .pl-art2, .pl-alb2 { color: var(--muted); }
        .pl-dur { text-align: right; color: var(--sub); font-size: 12px; }
        .pl-x {
            width: 22px; height: 22px; border: none; border-radius: 50%; background: rgba(255,255,255,.08);
            color: var(--text); font-size: 11px; line-height: 1; cursor: pointer; opacity: 0; font-family: inherit;
        }
        .pl-row:hover .pl-x { opacity: 1; }
        .pl-x:hover { background: #d66; color: #fff; }
        .pl-row.dragover { box-shadow: inset 0 2px 0 var(--accent); }
        .pl-row.dragging { opacity: .4; }
        /* "add to playlist" picker header (menu itself reuses .dlmenu) */
        .plm-title { padding: 4px 9px 6px; font-size: 11px; color: var(--sub); }
        /* custom playlist cover (detail header + browser cards reuse .pl-cover) */
        .pl-cover.clickable { cursor: pointer; }
        .pl-cover.clickable:hover { outline: 2px solid var(--accent); }
        /* playlist description under the title (click to edit) */
        .pl-desc {
            font-size: 12px; color: var(--muted); margin-top: 6px; max-width: 620px;
            white-space: pre-wrap; cursor: pointer; line-height: 1.5;
        }
        .pl-desc:hover { color: var(--text); }
        .pl-desc.empty { font-style: italic; color: var(--sub); }
        /* local-files marker on grid cards (mirrors the wishlist heart) */
        .localb {
            position: absolute; left: 6px; top: 6px; font-size: 10px; line-height: 1;
            background: rgba(24,26,27,.85); color: #8ac6ff; border-radius: 4px; padding: 4px 6px;
            pointer-events: none; letter-spacing: .04em;
        }
        /* multiline text in the name/description modal */
        .modal textarea {
            width: 100%; min-height: 96px; resize: vertical;
            background: #121415; border: 1px solid var(--line); border-radius: 6px;
            color: var(--text); padding: 8px 10px; font-size: 12px; font-family: inherit; outline: none;
        }
        .modal textarea:focus { border-color: var(--accent); }

        /* per-song add-to-queue, revealed on row hover */
        .tlq {
            width: 22px; height: 22px; flex-shrink: 0; border: none; border-radius: 50%;
            background: rgba(255,255,255,.08); color: var(--text); font-size: 14px; line-height: 1;
            cursor: pointer; opacity: 0; transition: opacity .1s ease; font-family: inherit;
        }
        .tlrow:hover .tlq { opacity: 1; }
        .tlq:hover { background: var(--accent); }
    </style>
</head>
<body>
    <div class="toolbar">
        <h1>Collection</h1>
        <span class="count" id="count"></span>
        <div class="spacer"></div>
        <input type="text" id="search" placeholder="Search artist, title, track or tag" spellcheck="false" autocomplete="off">
        <select id="scope" title="Show">
            <option value="all">Everything</option>
            <option value="own">Owned</option>
            <option value="wish">Wishlist</option>
            <option value="local">Local files</option>
        </select>
        <select id="sort" title="Sort by">
            <option value="added">Date added</option>
            <option value="artist">Artist</option>
            <option value="title">Album / title</option>
            <option value="year">Year</option>
        </select>
        <button class="tbtn" id="dir" title="Toggle direction">↓</button>
        <button class="tbtn" id="viewmode" title="Switch to track list view">≡</button>
        <button class="tbtn" id="plbtn" title="Your playlists">Playlists</button>
        <button class="tbtn" id="addlocal" title="Add audio files from your computer to the collection">+ Files</button>
        <button class="tbtn" id="refresh" title="Reload">Reload</button>
        <button class="tbtn" id="close" title="Close">Close</button>
    </div>
    <div class="grid" id="grid"><div class="state" id="state">Open your collection to load it…</div></div>
    <div class="plov" id="plov" style="display: none"></div>

    <script>require('./collection.js');</script>
</body>
</html>
