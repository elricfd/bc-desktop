<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Bandcamp</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #181a1b; color: #e8e6e3; height: 100vh; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Roboto, sans-serif;
            font-size: 13px; user-select: none; display: flex; flex-direction: column;
            border: 1px solid #2a2e30; border-radius: 8px;
        }
        .bar { -webkit-app-region: drag; height: 30px; flex-shrink: 0; }
        .body { padding: 0 22px 18px; flex: 1; }
        h1 { font-size: 15px; margin-bottom: 8px; }
        p { font-size: 12px; color: #9a968e; line-height: 1.6; }
        .row { display: flex; gap: 8px; justify-content: flex-end; padding: 0 22px 18px; }
        button {
            background: #24282a; border: 1px solid #2a2e30; color: #e8e6e3;
            border-radius: 6px; padding: 8px 14px; font-size: 12px; cursor: pointer; font-family: inherit;
        }
        button.primary { background: #1da0c3; border-color: #1da0c3; color: #fff; }
        button:hover { filter: brightness(1.12); }
    </style>
</head>
<body>
    <div class="bar"></div>
    <div class="body">
        <h1>Error 429: too many requests</h1>
        <p>Wait a little bit T__T — this is an unavoidable issue with Bandcamp's backend.
        Tracklists, the feed, and other loading may not work for a bit until it clears.
        Indexing slows itself down automatically and will pick back up.</p>
    </div>
    <div class="row">
        <button class="primary" id="ok">Ok</button>
        <button id="never">Don't show again</button>
    </div>
    <script>
        const { ipcRenderer } = require('electron');
        document.getElementById('ok').onclick = () => ipcRenderer.send('notice429:close', false);
        document.getElementById('never').onclick = () => ipcRenderer.send('notice429:close', true);
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape' || e.key === 'Enter') ipcRenderer.send('notice429:close', false); });
    </script>
</body>
</html>
