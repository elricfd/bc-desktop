<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; scrollbar-width: none; -ms-overflow-style: none; }
        ::-webkit-scrollbar { width: 0; height: 0; display: none; }
        :root {
            --bg: #181a1b; --bar: #1b1e1f; --card: #202325; --text: #e8e6e3;
            --muted: #9a968e; --sub: #848079; --line: #2a2e30; --accent: #1da0c3;
        }
        html, body { height: 100%; }
        body {
            background: var(--bg); color: var(--text); overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Roboto, sans-serif;
            display: flex; flex-direction: column; user-select: none;
        }
        .toolbar {
            display: flex; align-items: center; gap: 10px; padding: 12px 18px;
            border-bottom: 1px solid var(--line); background: var(--bar); flex-shrink: 0;
        }
        .toolbar h1 { font-size: 14px; font-weight: 600; margin-right: 6px; }
        .count { font-size: 11px; color: var(--sub); }
        .spacer { flex: 1; }
        input[type="text"], select {
            background: #121415; border: 1px solid var(--line); border-radius: 6px;
            color: var(--text); padding: 7px 10px; font-size: 12px; font-family: inherit; outline: none;
        }
        /* custom chevron so it isn't jammed against the right edge */
        select {
            -webkit-appearance: none; appearance: none; padding-right: 30px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 10 10"><path d="M2 3.5l3 3 3-3" fill="none" stroke="%239a968e" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>');
            background-repeat: no-repeat; background-position: right 11px center;
        }
        input[type="text"]:focus, select:focus { border-color: var(--accent); }
        #search { width: 220px; }
        .tbtn {
            background: #24282a; border: 1px solid var(--line); color: var(--text);
            border-radius: 6px; padding: 7px 10px; font-size: 12px; cursor: pointer;
        }
        .tbtn:hover { border-color: var(--accent); }
        .grid {
            flex: 1; overflow-y: auto; padding: 16px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; align-content: start;
        }
        .card { cursor: pointer; }
        .card .art {
            width: 100%; aspect-ratio: 1 / 1; border-radius: 6px; background: #2a2e30;
            object-fit: cover; display: block; transition: transform .12s ease;
        }
        .card:hover .art { transform: scale(1.03); outline: 2px solid var(--accent); }
        .card .t { font-size: 12px; margin-top: 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card .a { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
        .card .y { font-size: 10px; color: var(--sub); margin-top: 1px; }
        .state { padding: 40px 18px; color: var(--muted); font-size: 13px; }

        .artwrap { position: relative; }
        .dl {
            position: absolute; right: 6px; bottom: 6px; width: 28px; height: 28px;
            border: none; border-radius: 50%; background: rgba(24,26,27,.82); color: #fff;
            font-size: 15px; line-height: 1; cursor: pointer; opacity: 0; transition: opacity .12s ease;
        }
        .card:hover .dl { opacity: 1; }
        .dl:hover { background: var(--accent); }
        .enq {
            position: absolute; right: 6px; top: 6px; width: 28px; height: 28px;
            border: none; border-radius: 50%; background: rgba(24,26,27,.82); color: #fff;
            font-size: 18px; line-height: 1; cursor: pointer; opacity: 0; transition: opacity .12s ease;
        }
        .card:hover .enq { opacity: 1; }
        .enq:hover { background: var(--accent); }
        .dlmenu {
            position: fixed; z-index: 50; width: 190px; background: #202325;
            border: 1px solid var(--line); border-radius: 8px; padding: 6px; font-size: 12px;
            color: var(--muted); box-shadow: 0 8px 24px rgba(0,0,0,.4);
            max-height: 320px; overflow-y: auto;
        }
        .dlfmt {
            display: block; width: 100%; text-align: left; background: none; border: none;
            color: var(--text); padding: 7px 9px; border-radius: 5px; font-size: 12px; cursor: pointer;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .dlfmt:hover { background: rgba(255,255,255,.06); }

        /* inline tracklist: full-width panel that drops in below a release's row */
        .tlinline {
            grid-column: 1 / -1; display: flex; gap: 18px; align-items: flex-start;
            background: #1b1e1f; border: 1px solid var(--line); border-radius: 10px;
            padding: 16px; margin: 2px 0; overflow: hidden; animation: tlslide .18s ease;
        }
        @keyframes tlslide { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
        .tlleft { width: 170px; flex-shrink: 0; }
        .tlart { width: 100%; aspect-ratio: 1/1; border-radius: 6px; object-fit: cover; background: #2a2e30; display: block; }
        .tltitle { font-size: 14px; font-weight: 600; margin-top: 8px; }
        .tlartist { font-size: 12px; color: var(--muted); margin-top: 2px; }
        .tlyear { font-size: 11px; color: var(--sub); margin-top: 2px; }
        .tlbtns { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .tlbtns button {
            background: #24282a; border: 1px solid var(--line); color: var(--text);
            border-radius: 6px; padding: 6px 10px; font-size: 11px; cursor: pointer; font-family: inherit;
        }
        .tlbtns .tlplayall { background: var(--accent); border-color: var(--accent); color: #fff; }
        .tlbtns button:hover { filter: brightness(1.12); }
        .tlright { flex: 1; min-width: 0; column-width: 260px; column-gap: 24px; }
        .tlstate { color: var(--muted); font-size: 13px; padding: 8px 0; }
        .tlrow {
            display: flex; align-items: center; gap: 10px; padding: 6px 8px; cursor: pointer;
            font-size: 13px; border-radius: 5px; break-inside: avoid;
        }
        .tlrow:hover { background: rgba(255,255,255,.06); }
        .tlnum { width: 20px; text-align: right; color: var(--sub); font-size: 12px; flex-shrink: 0; }
        .tltrk { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tldur { color: var(--sub); font-size: 12px; flex-shrink: 0; }
    </style>
</head>
<body>
    <div class="toolbar">
        <h1>Collection</h1>
        <span class="count" id="count"></span>
        <div class="spacer"></div>
        <input type="text" id="search" placeholder="Search artist or title" spellcheck="false" autocomplete="off">
        <select id="sort" title="Sort by">
            <option value="added">Date added</option>
            <option value="artist">Artist</option>
            <option value="title">Album / title</option>
            <option value="year">Year</option>
        </select>
        <button class="tbtn" id="dir" title="Toggle direction">↓</button>
        <button class="tbtn" id="refresh" title="Reload">Reload</button>
        <button class="tbtn" id="close" title="Close">Close</button>
    </div>
    <div class="grid" id="grid"><div class="state" id="state">Open your collection to load it…</div></div>

    <script>require('./collection.js');</script>
</body>
</html>
